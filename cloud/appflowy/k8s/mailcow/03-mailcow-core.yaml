apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailcow
  namespace: mailcow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailcow
  template:
    metadata:
      labels:
        app: mailcow
    spec:
      containers:
        - name: postfix
          image: mailcow/postfix:latest
          envFrom:
            - configMapRef:
                name: mailcow-config
            - secretRef:
                name: mailcow-secrets
          ports:
            - containerPort: 25
            - containerPort: 587
            - containerPort: 465
          volumeMounts:
            - name: mail-data
              mountPath: /var/spool/postfix
        - name: dovecot
          image: mailcow/dovecot:latest
          envFrom:
            - configMapRef:
                name: mailcow-config
            - secretRef:
                name: mailcow-secrets
          ports:
            - containerPort: 993
            - containerPort: 995
            - containerPort: 143
          volumeMounts:
            - name: mail-data
              mountPath: /var/mail
        - name: rspamd
          image: mailcow/rspamd:latest
          ports:
            - containerPort: 11333
            - containerPort: 11334
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: mail-data
          persistentVolumeClaim:
            claimName: mailcow-data
        - name: nginx-config
          configMap:
            name: nginx-config