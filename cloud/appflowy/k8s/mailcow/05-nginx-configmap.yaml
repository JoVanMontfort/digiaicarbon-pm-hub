apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: mailcow
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
    
        location / {
            return 404;
        }
    
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }