apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: mailcow
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:13
          env:
            - name: POSTGRES_DB
              value: mailcow
            - name: POSTGRES_USER
              value: mailcow
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mailcow-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: mailcow
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgresql