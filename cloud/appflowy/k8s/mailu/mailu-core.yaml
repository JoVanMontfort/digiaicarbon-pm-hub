---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailu-imap
  namespace: mailcow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailu-imap
  template:
    metadata:
      labels:
        app: mailu-imap
    spec:
      containers:
        - name: imap
          image: mailu/dovecot:2.0
          ports:
            - containerPort: 993
            - containerPort: 995
            - containerPort: 143
          envFrom:
            - configMapRef:
                name: mailu-config
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: mail-data
              mountPath: /mail
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
      volumes:
        - name: secrets
          secret:
            secretName: mailu-secrets
        - name: mail-data
          persistentVolumeClaim:
            claimName: mailcow-data