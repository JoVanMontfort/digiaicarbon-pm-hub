apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appflowy-ingress
  namespace: appflowy
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: appflowy.yourdomain.com  # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appflowy-service
                port:
                  number: 80